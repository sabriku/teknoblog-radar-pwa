<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teknoblog Editorial Radar</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Teknoblog Editorial Radar</h1>
      <p id="status">Yükleniyor...</p>
    </header>

    <section class="toolbar">
      <label>Minimum toplam skor
        <input type="range" min="0" max="100" value="0" id="scoreFilter">
        <span id="scoreFilterValue">0</span>
      </label>
      <label>Tür
        <select id="typeFilter">
          <option value="">Tümü</option>
          <option value="hot_news">Bugün haber olur</option>
          <option value="launch">Lansman</option>
          <option value="update">Güncelleme</option>
          <option value="guide">Rehbere dönüşür</option>
          <option value="comparison">Karşılaştırma</option>
          <option value="deal">Dönüşüm potansiyeli yüksek</option>
          <option value="analysis">Analiz</option>
        </select>
      </label>
      <label>CRON token
        <input type="password" id="cronToken" placeholder="Sadece manuel tetikleme için">
      </label>
      <button id="refreshBtn">Veriyi yenile</button>
      <button id="runPipelineBtn">Pipeline çalıştır</button>
    </section>

    <section id="recommendations" class="list"></section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
